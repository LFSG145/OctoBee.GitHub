<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="css/weather-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Check weather conditions worldwide</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="geolocationBtn" class="geolocation-btn">📍 Use My Location</button>
        </div>

        <div id="error-message" class="error-message"></div>

        <div id="weather-container" class="weather-container">
            <!-- Current Weather -->
            <div class="current-weather">
                <div class="city-info">
                    <h2 id="cityName">--</h2>
                    <p id="dateTime" class="date-time">--</p>
                    <p id="weatherDescription" class="description">--</p>
                </div>
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                    <span id="temperature" class="temperature">--°</span>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value">--°C</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value">--%</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value">-- m/s</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value">-- hPa</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">UV Index</span>
                        <span id="uvIndex" class="detail-value">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value">-- km</span>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecast-container" class="forecast-container">
                    <!-- Forecast cards will be populated by JavaScript -->
                </div>
            </div>
        </div>

        <footer>
            <p>Data provided by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
            <p>Last updated: <span id="lastUpdate">Never</span></p>
        </footer>
    </div>

    <script src="js/weather.js"></script>
</body>
</html>
